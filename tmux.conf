unbind C-b
set -g prefix C-a
setw -g mode-keys vi
bind-key a send-prefix
# bind -n M-h select-pane -L
# bind -n M-l select-pane -R
# bind -n M-k select-pane -U
# bind -n M-j select-pane -D

#bind-key -n C-Tab next-window
#bind-key -n C-S-Tab previous-window

bind-key -n M-C-h previous-window
bind-key -n M-C-l next-window
bind-key s set status

setw -g monitor-activity on
set -g visual-activity on

set -g base-index 1

# set-hook -g 'after-new-window' 'run-shell -b "if [\#{window_panes} -eq 1 ]; then tmux set -g status off; fi"'
# set-hook -g 'after-kill-pane' 'run-shell -b "if [\#{window_panes} -eq 1 ]; then tmux set -g status off; fi"'
# set-hook -g 'after-split-window' 'run-shell -b "if [\#{window_panes} -gt 1 ]; then tmux set -g status off; fi"'

######################
### DESIGN CHANGES ###
######################
set-window-option -g automatic-rename on
set-option -g set-titles on
set -g renumber-windows on

# panes
set -g pane-border-fg brightblack
set -g pane-active-border-fg brightblack

## Status bar design
# status line
set -g status-justify left
set -g status-bg default
set -g status-fg colour12
set -g status-interval 2

# messaging
set -g message-fg black
set -g message-bg yellow
set -g message-command-fg blue
set -g message-command-bg black

#window mode
#setw -g mode-bg colour6
#setw -g mode-fg colour0
set -g window-style 'bg=colour08'
set -g window-active-style 'bg=colour00'

# window status
setw -g window-status-format ' #F#I:#(pwd="#{pane_current_path}"; echo ${pwd####*/})#F '
setw -g window-status-current-format ' #F#I:#(pwd="#{pane_current_path}"; echo ${pwd####*/})#F '
setw -g window-status-format "#[fg=magenta]#[bg=black] #I #[bg=cyan]#[fg=colour8] #W "
setw -g window-status-current-format "#[bg=brightmagenta]#[fg=colour8] #I #[fg=colour8]#[bg=colour14] #W "
setw -g window-status-current-bg colour0
setw -g window-status-current-fg colour11
setw -g window-status-current-attr dim
setw -g window-status-bg green
setw -g window-status-fg black
setw -g window-status-attr reverse

# Info on left (I don't have a session display for now)
set -g status-left ''

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

set -g default-terminal "xterm-256color"

# The modes {
setw -g clock-mode-colour colour135
setw -g mode-attr bold
setw -g mode-fg colour196
setw -g mode-bg colour238

# }
# The panes {

#set -g pane-border-bg colour235
#set -g pane-border-fg colour238
#set -g pane-active-border-bg colour236
#set -g pane-active-border-fg colour51

# }
# The statusbar {
set-option -g status on
set-option -g status-interval 2

set -g status-position bottom
set -g status-bg colour0
set -g status-fg black
# set -g status-attr dim
# set -g status-left ' ●'
set -g status-left ''
set -g status-right '#[fg=colour7,nobold] %m/%d #[fg=colour7,nobold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 10
set -g window-status-separator ''

setw -g window-status-current-fg black
setw -g window-status-current-bg green
setw -g window-status-current-attr bold
setw -g window-status-current-format ' #I #[fg=black,nobold]#W '
# 
setw -g window-status-fg colour8
setw -g window-status-bg colour0
setw -g window-status-attr none
setw -g window-status-format ' #[fg=white]#I #[fg=colour250]#W '

setw -g window-status-bell-attr bold
setw -g window-status-bell-fg colour255
setw -g window-status-bell-bg colour1

# }
# The messages {

set -g message-attr bold
set -g message-fg colour232
set -g message-bg colour166

# }

# smart pane switching with awareness of vim splits
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vim|vagrant' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vim|vagrant' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vim|vagrant' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vim|vagrant' && tmux send-keys C-l) || tmux select-pane -R"
bind -n C-\ run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vim|vagrant' && tmux send-keys 'C-\\') || tmux select-pane -l"

set -sg escape-time 0

set-option -g mouse on
set -g mouse on

bind -n WheelUpPane		select-pane -t= \; copy-mode -e \; send-keys -M
bind -n WheelDownPane	select-pane -t= \;				   send-keys -M
