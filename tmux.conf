unbind C-b
set -g prefix C-a
setw -g mode-keys vi
bind -r a send-prefix
bind -r C-a send-prefix

bind C-c new-window
bind -n M-C-h previous-window \; refresh-client
bind -n M-C-l next-window \; refresh-client
bind * kill-session
bind s source-file ~/dotfiles/.tmux.session.conf
bind Z select-pane -l \; resize-pane -Z

bind -t vi-copy Enter copy-pipe "xclip -i -f -selection primary | xclip -i -selection clipboard"
bind -t vi-copy v begin-selection
bind -t vi-copy y copy-pipe "xclip -i -f -selection primary | xclip -i -selection clipboard"
bind -t vi-copy C-v rectangle-toggle
bind ] run-shell "tmux set-buffer \"$(xclip -o)\"; tmux paste-buffer"

# smart pane switching with awareness of vim splits
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vi' && tmux send-keys C-h) || tmux select-pane -L \\; refresh-client"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vi' && tmux send-keys C-j) || tmux select-pane -D \\; refresh-client"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vi' && tmux send-keys C-k) || tmux select-pane -U \\; refresh-client"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vi' && tmux send-keys C-l) || tmux select-pane -R \\; refresh-client"
bind -n C-\ run "(tmux display-message -p '#{pane_current_command}' | grep -iqP 'vi' && tmux send-keys 'C-\\') || tmux select-pane -l"

setw -g main-pane-width 200

# use emacs keybinds in status line
set -g status-keys emacs

set -sg escape-time 0

# mouse mode
set -g mouse on

bind -n WheelUpPane	select-pane -t= \; copy-mode -e \; send-keys -M
bind -n WheelDownPane	select-pane -t= \;                 send-keys -M

######################
### DESIGN CHANGES ###
######################
# Title and numbers {{{
set -g base-index 1
set -g pane-base-index 1
setw -g automatic-rename on
set -g set-titles on
set -g renumber-windows on
# }}}

# panes {{{
set -g pane-border-fg colour238
set -g pane-active-border-fg colour238
# }}}

# messaging
set -g message-style fg=colour46,bold,bg=colour232

#window mode {{{
set -g window-style bg=colour235
set -g window-active-style bg=colour233
# }}}

# Bells {{{
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
# }}}

set -g default-terminal "xterm-256color"

# The modes {{{
setw -g clock-mode-colour colour135
setw -g clock-mode-style 12
setw -g mode-attr bold
setw -g mode-fg colour135
setw -g mode-bg colour237
# }}}

# The statusbar {{{

set -g status on

set -g status-position bottom
set -g status-justify centre
set -g status-bg colour233
set -g status-fg colour254
set -g status-left '#[fg=colour68] #(~/dotfiles/tmux/username.sh) #[fg=colour240]#(~/dotfiles/tmux/hostname.sh) '
set -g status-right '#{battery_status_fg}#{battery_percentage} #{battery_remain}#[fg=colour111,nobold] %b %d %a #[fg=colour68,nobold]%l:%M:%S %P '
set -g status-right-length 50
set -g status-left-length 50
set -g window-status-separator ''
set -g status-interval 1

setw -g window-status-current-fg colour235
setw -g window-status-current-bg colour236
setw -g window-status-current-attr bold
setw -g window-status-current-format '#[bg=colour167,fg=colour233] #I #[fg=colour167,bg=colour233] #W#[fg=colour167,nobold]#{?window_zoomed_flag, ⊠,} '

setw -g window-status-fg colour240
setw -g window-status-bg colour233
setw -g window-status-attr none
setw -g window-status-format '#[fg=colour243,bg=colour236] #I #[bg=colour233] #W '
setw -g window-status-separator ' '

setw -g window-status-bell-attr bold
setw -g window-status-bell-fg colour255
setw -g window-status-bell-bg colour1

# }}}

run-shell ~/dotfiles/tmux/battery.tmux
